name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install root dependencies (legacy tests)
        run: npm ci

      - name: Run legacy transformer tests
        run: npm run test:all

      - name: Install app/ dependencies
        working-directory: ./app
        run: npm ci

      - name: App unit tests (transformer registry + gibberish parity)
        working-directory: ./app
        run: npm run test:unit

      - name: Svelte type check
        working-directory: ./app
        run: npm run check

      - name: Build SvelteKit app
        working-directory: ./app
        env:
          BASE_PATH: ${{ github.event.repository.name != github.event.repository.owner.login && format('/{0}', github.event.repository.name) || '' }}
        run: npm run build

      - name: Verify build output
        run: |
          test -f app/build/index.html || (echo "app/build/index.html missing" && exit 1)
          test -f app/build/gibberish/index.html || (echo "gibberish route missing" && exit 1)
          test -f app/build/favicon.svg || (echo "favicon missing" && exit 1)
          echo "Critical build files present"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'app/build/'
          retention-days: 7

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
